name: Deploy (pm2)

# Déploiement en production via SSH + PM2.
# Déclenché sur push vers la branche par défaut (main/master).
#
# Secrets requis (Settings > Secrets and variables > Actions) :
#   SSH_HOST      -> hôte/IP du VPS
#   SSH_USER      -> utilisateur SSH
#   SSH_KEY       -> clé privée SSH (format PEM)
#   SSH_PORT      -> (optionnel) port SSH, défaut 22
#   DEPLOY_PATH   -> (optionnel) chemin du repo sur le serveur, défaut ~/luxuryhomeabidjan

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to VPS (pm2)
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy via SSH + pm2
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -o StrictHostKeyChecking=no -p "$PORT" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BRANCH='${{ github.ref_name }}' bash -s" <<'DEPLOY'
          set -euo pipefail
          APP_DIR="${DEPLOY_PATH:-$HOME/luxuryhomeabidjan}"
          echo "==> Deploying luxuryhomeabidjan in $APP_DIR (branch $BRANCH)"
          cd "$APP_DIR"

          git fetch --all --prune
          git reset --hard "origin/$BRANCH"

          corepack enable || true
          pnpm install --frozen-lockfile
          pnpm build

          pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
          pm2 save
          echo "==> Done"
          DEPLOY
